interface:
  display_name: "Suede SEO Audit"
  short_description: "9-lane SEO and AI visibility audit"
  default_prompt: "Use $suede-seo-audit to audit [URL or source file]. Run all nine lanes: technical access, search and answer intent, metadata, structure, schema markup, AI EO, copy and conversion quality, E-E-A-T, and topic clusters. Add Lane 0 keyword research with a content brief and competitor gap analysis when keyword discovery is requested. Return ranked findings with exact rewrites, lane grades, and a ship gate."
policy:
  allow_implicit_invocation: true
