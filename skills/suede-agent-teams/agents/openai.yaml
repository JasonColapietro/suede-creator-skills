interface:
  display_name: "Suede Agent Teams"
  short_description: "Coordinate multi-lane agent work safely"
  default_prompt: "Use $suede-agent-teams to orchestrate [task]. Define the Team Contract and lane map, run WIP collision detection, open parallel lanes only where safe, apply RFC mode for broad-blast-radius decisions, gate with quality checks — allowing up to three genuinely different fixes per failing check and stopping early when the same root cause repeats — and close with a signed handoff."
policy:
  allow_implicit_invocation: true
