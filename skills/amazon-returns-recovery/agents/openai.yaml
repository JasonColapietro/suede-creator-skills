interface:
  display_name: "Amazon Returns Recovery — Fee, Refund & Subscription Disputes"
  short_description: "Recover Amazon fees and cancel subscriptions"
  default_prompt: "Use $amazon-returns-recovery to scan my Amazon order/return history and digital subscriptions for restocking fees, short refunds, and forgotten charges, report what you find, and after I confirm which ones to pursue, drive Amazon's live chat to get them waived, refunded, or canceled."
policy:
  allow_implicit_invocation: true
